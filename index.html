<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kanban Task Management App</title>
</head>
<body>

    <header>
        <h1>📋 Kanban Board</h1>
        <div class="badge-container">
            Tasks: <span id="task-count">0</span>
        </div>

        <label for="priority-filter">Filter by Priority:</label>
        <select id="priority-filter">
            <option value="all">All</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>
    </header>

    <main>
        <section id="todo">
            <h2>To Do</h2>
            <ul id="todo-list"></ul>
            <button class="add-btn">Add Task</button>
        </section>

        <section id="inprogress">
            <h2>In Progress</h2>
            <ul id="inprogress-list"></ul>
            <button class="add-btn">Add Task</button>
        </section>

        <section id="done" class="card">
            <h2>Done</h2>
            <ul id="done-list"></ul>
            <button id="clear-done-btn" style="background: #64748b; margin-top: 0.5rem;">Clear All</button>
            <button class="add-btn">Add Task</button>
        </section>
    </main>

    <div id="task-modal" hidden>
        <div class="modal-content">
            <h3>Add/Edit Task</h3>
            
            <label for="task-title">Title:</label>
            <input type="text" id="task-title" placeholder="Enter task title">

            <label for="task-desc">Description:</label>
            <textarea id="task-desc" placeholder="Enter task description"></textarea>

            <label for="task-priority">Priority:</label>
            <select id="task-priority">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>

            <label for="due-date">Due Date:</label>
            <input type="date" id="due-date">

            <div class="modal-actions">
                <button id="save-btn">Save</button>
                <button id="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>

</body>
</html>
